<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A showcase of projects by Andrii Avramenko"/>
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#B153D7">

    <meta property="og:title" content="Andrii Avramenko — Portfolio">
    <meta property="og:description" content="A showcase of projects by Andrii Avramenko">
    <meta property="og:url" content="https://andrii-avramenko.github.io/">
    <meta property="og:type" content="profile">

    <title>Andrii Avramenko — Portfolio</title>
    <link rel="stylesheet" href="./sass/index.scss" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Chiron+GoRound+TC&family=Inter:opsz,wght@14..32,700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
  </head>
  <body>
    <section class="hero">
      <div class="container">
        <div class="hero-card">
          <div class="hero-hello">
            <p class="hero-text">Hello</p>
            <p class="hero-subtext">my name is</p>
          </div>
          <div class="hero-name">
            <p><b>Andrii</b> Avramenko</p>
          </div>
        </div>
      </div>
    </section>
    <section class="about">
      <div class="container">
        <div class="about-langs">
          <svg class="about-html animate" style="--svgGlow: #F16529">
            <use href="./images/portfolio.svg#icon-html"></use>
          </svg>
          <svg class="about-sass animate" style="--svgGlow: #CD6799">
            <use href="./images/portfolio.svg#icon-sass"></use>
          </svg>
          <img src="./images/js-logo.png" alt="JavaScript logo" class="about-js animate" style="--svgGlow: #F7DF1D">
        </div>
        <p class="about-title">Front-end developer</p>
      </div>
    </section>
      <section class="projects">
        <div class="container">
          <p class="projects-title">My Projects</p>
          <ul class="projects-list"></ul>
        </div>
      </section>
      <footer class="footer">
        <div class="container">
          <h2 class="footer-title">Contact me</h2>
          <address class="footer-address">
            <a href="mailto:avinap711@gmail.com" class="footer-email">avinap711@gmail.com</a>
            <div class="footer-icons animate">
              <a href="https://github.com/Andrii-Avramenko" class="footer-icon">
                <svg>
                  <use href="./images/portfolio.svg#icon-github"></use>
                </svg>
              </a>
              <a href="https://t.me/Andrklch" class="footer-icon">
                <svg>
                  <use href="./images/portfolio.svg#icon-telegram"></use>
                </svg>
              </a>
            </div>
          </address>
        </div>
      </footer>
    <script type="module" src="./script.js"></script>
  </body>

</html>
